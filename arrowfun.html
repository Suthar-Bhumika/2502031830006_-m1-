<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <!-- anonymous function -->
    <script>
        let welcome=function(name, age){
            return `Hello & Welcome ${name}-${age}<br>`;
        }
        document.write(welcome("Yahoo Baba",25));
    </script>

    <!-- arrow function -->
     <script>
        let Welcome=(name)=>`Hello & Welcome ${name}`; 
        document.write(Welcome("Yahoo Baba")); 
     </script>
</body>
</html>
