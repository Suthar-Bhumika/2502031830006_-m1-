<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="#" width="80%" style="background-color:rgb(102, 194, 102);">

        <h2 align="center">Registration Form</h2>
        <table border="1" width="100%">

        <tr>
            <td align="center"><label for="fname">First Name:</label></td>
            <td><input type="text" name="fname" id="fname" placeholder="enter first name" required></td>
        </tr>

        <tr>
            <td align="center"><label for="lname">Last Name:</label></td>
            <td><input type="text" name="lname" id="lname" placeholder="enter last name" required></td>
        </tr>

        <tr>
            <td align="center"><label for="con">Enter contact no:</label></td>
            <td><input type="tel" name="con" id="con" placeholder="contact no" required></td>
        </tr>

        <tr>
            <td align="center"><label for="lno">Landline No:</label></td>
            <td><input type="tel" name="lno" id="lno" placeholder="enter your Landline no" required></td>
        </tr>


        <tr>
            <td align="center"><label for="email">Email:</label></td>
            <td><input type="email" name="email" id="email" placeholder="enter your email ID" required></td>
        </tr>

        <tr>
            <td align="center"><label for="pass">Password:</label></td>
            <td><input type="password" name="pass" id="pass" placeholder="enter a New Password:" required></td>
        </tr>

        <tr>
            <td align="center"><label for="dob">Date of Birth:</label></td>
            <td><input type="date" name="dob" id="dob" placeholder="ddmmyyyy" required></td>
        </tr>

        <tr>
            <td align="center"><label for="age">Age:</label></td>
            <td><input type="number" name="age" id="age" placeholder="enter age:" required></td>
        </tr>

        <tr>
            <td align="center"><label for="gender">Gender:</label></td>
            <td>
                <input type="radio" id="male" name="gender" value="male">
                <label for="male">Male</label>
                <input type="radio" id="female" name="gender" value="female">
                <label for="female">Female</label></td>
        </tr>

        <tr>
            <td align="center"><label for="add">Add:</label></td>
            <td><textarea name="add" id="add" cols="3"></textarea></td>
        </tr>

        <tr>
            <td align="center"><label for="city">City:</label></td>
            <td><select name="city" id="city">
                <option value="Select City">Select City</option>
                <option value="A">A</option>
                <option value="B">B</option>
                <option value="C">C</option>
            </select></td>
        </tr>

        <tr>
            <td align="center"><label for="pin">Pincode:</label></td>
            <td><input type="text" name="pin" id="pin" required></td>
        </tr>


        <tr>
            <td align="center"><label for="doj">Joining Date:</label></td>
            <td><input type="date" name="doj" id="doj" placeholder="ddmmyyyy" required></td>
        </tr>


        <tr>
            <td align="center"><label for="confirm">confirm your form:</label></td>
            <td><input type="submit" name="confirm" id="confirm" value="Submit">
            <input type="reset" name="confirm" id="confirm" value="Reset">
        </td>
        </tr>

        </table>

    </form>
</body>
</html>
