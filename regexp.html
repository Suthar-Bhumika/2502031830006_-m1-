<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <input type="email" id="mytext">
    <input type="button" value="click" onclick="checkmail()">
    <script>
        function checkmail(){
            var a=document.getElementById("mytext").value;
            var pattern="^[\\w-_\.]*[\\w-_\.]\@[\\w]\.+[\\w]+[\\w]$";
            var regex=new RegExp(pattern);
            if(regex.test(a)){
                alert("valid");
            }
            else{
                alert("invalid");
            }
        }
    </script>
</body>
</html>
