<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body id="mybody">
    <h1></h1>
    Select Product : 
    <select name="" id="product">
    <option value="45000">AC</option>
    <option value="22000">TV</option>
    <option value="15000">Refrigerator</option>
    <option value="70000">Laptop</option> </select>

    <br><br>

    Net Prize : 
    <input type="text" id="prize"> 
    
    <br><br>

    Quantity : 
    <input type="text" id="quantity">
    <br><br>

    Total Amount :
    <input type="text" id="amount">

    <script>
        var product=document.getElementById("product");
        var quantity=document.getElementById("quantity");
        var amount=document.getElementById("amount");
        var prize=document.getElementById("prize");

        product.addEventListener("change",()=>{
            prize.value=product.value;
        });

        amount.addEventListener("focus",()=>{
            amount.value=product.value * quantity.value;

        });
    </script>

    <h1>mouseover and mouseout event</h1>
    <img src="image/b1.jpg" alt="" id="bulb">
    <script>

    var a = document.getElementById("bulb");
    a.addEventListener("mouseover",()=>{
        a.src= "image/b2.jpg";
    });
    a.addEventListener("mouseout",()=>{
        a.src= "image/b1.jpg";

    });

    </script>

    <h1>Keypress events</h1>
    <p>Press any key to display Current Date :</p>
    <input type="text" id="key">

    <script>
    var key = document.getElementById("key");
    key.addEventListener("keypress",()=>{
        var a = new Date();
        alert(a)
    });
    </script>


    <h1>click event</h1>
    <input type="text" id="rows" placeholder="Enter Rows"> <br>
    <input type="text" id="cols" placeholder="Enter Cols"> <br>
    <input type="button" value="Generate Table" id="btn1">

    <script>
    var rows = document.getElementById("rows");
    var cols = document.getElementById("cols");
    var btn1 = document.getElementById("btn1");
    btn1.addEventListener("click",()=>{
        document.write("<table border='2' width='50%'>");
        for(let i=0; i<rows.value; i++){
            document.write("<tr>")
            for(j=0; j<cols.value; j++){
                document.write("<td>" + "[" +i+"]" + "["+j+"]" + "</td>");
            }
            document.write("</tr>");
        }
        document.write("</table>");
    });
    </script>


    <script>
    setTimeout(callme,2000);
    function callme() {
    alert('Welcome in ASOIT');
    }
    </script>

    <script>
    setInterval(callme,2000);
    function callme() {
    alert('Welcome in ASOIT');
    }
    </script>

    <script>
    var colors = ["red","green","blue","pink","black","orange"];
    var mybody = document.getElementById("mybody");
    var i=0;
    setInterval(()=>{
    mybody.style.backgroundColor = colors[i];
    ++i;
    if(i==colors.length)
    {
    i=0;
    }
    },1000)
    </script>
</body>
</body>
</html>
