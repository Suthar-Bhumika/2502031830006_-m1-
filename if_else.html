<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <h1>check even or odd number</h1>
    <script>
        var num=10;
        document.write("num="+num+"<br>");
        if (num%2==0){
            document.write("num is even");
        }
        else{
            document.write("num is odd");
        }
    </script>


    <h1>check pass or fail</h1>
    <script>
        var mark=60;
        document.write("mark="+mark+"<br>");
        if (mark>30){
            document.write("you are pass");
        }
        else{
            document.write("you are fail");
        }
    </script>


    <h1>check leap year</h1>
    <script>
        var year=2028;
        document.write("year="+year+"<br>");
        if (((year%4==0) && (year%100!==0)) || (year%400==0)){
            document.write("year is leap year");
        }
        else{
            document.write("year is not leap year");
        }
    </script>


    <h1>check for diriving eligibility</h1>
    <script>
            var age_drive=19;
            document.write("age_drive="+age_drive+"<br>");
            if (age_drive>18){
                document.write("you can drive");
            }
            else{
                document.write("you cann't drive");
            }
        </script>


    
</body>
</html>
